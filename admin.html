<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="sidebar">

<h2>🍫 Trufameli</h2>

<a href="#">📊 Dashboard</a>
<a href="#produtos">📦 Produtos</a>
<a href="#pedidos">🧾 Pedidos</a>
<a href="#" onclick="logout()">🚪 Sair</a>

</div>


<div class="main">

<h1>Painel Administrativo</h1>


<div class="cards">

<div class="card-stat">
<h3 id="total-produtos">0</h3>
<p>Produtos</p>
</div>

<div class="card-stat">
<h3 id="total-pedidos">0</h3>
<p>Pedidos</p>
</div>

<div class="card-stat">
<h3 id="total-vendas">R$0</h3>
<p>Faturamento</p>
</div>

</div>


<h2 id="produtos">Adicionar Produto</h2>

<input id="nome" placeholder="Nome do produto">
<input id="preco" placeholder="Preço">
<input id="imagem" placeholder="URL da imagem">

<button onclick="adicionarProduto()">Adicionar Produto</button>


<h2>Produtos cadastrados</h2>

<div id="lista-produtos"></div>


<h2 id="pedidos">Pedidos</h2>

<div id="lista-pedidos"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
